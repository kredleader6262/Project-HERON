<div class="card decision-card" data-kind="policy">
  <div class="card-head">
    <span class="micro" style="color:var(--warn);">Policy fired</span>
    <h3>{{ act.id or '?' }} → {{ act.action }}</h3>
  </div>
  <div class="card-body">
    <div class="muted mono" style="font-size:0.74rem;">
      {{ act.when or '' }}
    </div>
    {% if act.reason %}
    <div class="dim" style="font-size:0.72rem; margin-top:0.4rem;">{{ act.reason }}</div>
    {% endif %}
  </div>
  <div class="card-actions">
    <a class="link" href="/policies">Review policies →</a>
  </div>
</div>
